title: "Pianfan's blog"
description: "翩帆的个人技术博客"

avatar: /images/avatar.png
favicon: /images/favicon.ico
favicon_dark: /images/favicon-dark.ico

navigation:
  - name: 首页
    url: /
  - name: 关于
    url: /about/
  - name: 分类
    url: /tags/

paginate: 8

excerpt_separator: <!-- more -->

footer-links:
  zhihu:
  email: yunhan.xiong@foxmail.com
  facebook:
  github: pianfan
  rss: welcome! # just type anything here for a working RSS icon
  twitter:
  youtube:

footer-text: Copyright (c) 2026 Pianfan

url: https://pianfan.github.io

permalink: /:title/
paginate_path: /page:num/

# Giscus comments — fill repo-id / category-id from https://giscus.app
# Prerequisites: enable Discussions on the repo, then configure giscus.app
giscus:
  repo: pianfan/pianfan.github.io
  repo-id: R_kgDOLJQ7fQ
  category: Announcements
  category-id: DIC_kwDOLJQ7fc4CcrSF
  mapping: pathname
  reactions-enabled: "1"
  emit-metadata: "0"
  input-position: bottom
  # Initial theme is overridden by page script to match site dark/light mode
  theme: light
  lang: zh-CN

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

sass:
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
  - .github
  - .gitignore
