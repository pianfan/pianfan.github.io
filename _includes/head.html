<head>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>

  {% include meta.html %}

  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'system';
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme !== 'light' && prefersDark);
        document.documentElement.classList.toggle('dark-mode', isDark);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  <link rel="icon" id="siteFavicon" href="{{ site.baseurl }}{{ site.favicon }}">
  <script>
    (function () {
      var lightHref = '{{ site.baseurl }}{{ site.favicon }}';
      var darkHref = '{{ site.baseurl }}{{ site.favicon_dark | default: site.favicon }}';
      var mq = window.matchMedia('(prefers-color-scheme: dark)');

      function applyFavicon(isSystemDark) {
        var href = isSystemDark ? darkHref : lightHref;
        var existing = document.getElementById('siteFavicon')
          || document.querySelector("link[rel='icon'], link[rel='shortcut icon']");
        var fresh = document.createElement('link');
        fresh.id = 'siteFavicon';
        fresh.rel = 'icon';
        fresh.href = href;
        if (existing) {
          existing.parentNode.replaceChild(fresh, existing);
        } else {
          document.head.appendChild(fresh);
        }
      }

      applyFavicon(mq.matches);
      mq.addEventListener('change', function (e) {
        applyFavicon(e.matches);
      });
    })();
  </script>
  <script>
    (function(d) {
      var config = {
        kitId: 'vbt3gjx',
        scriptTimeout: 3000,
        async: true
      },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <script>
    MathJax = {
      tex: {
        inlineMath: {'[+]': [['$', '$']]}
      },
      options : {
        enableSpeech: false,
        enableBraille: false,
        menuOptions: {
          settings: {
            enrich: false,
          }
        }
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"></script>
</head>
