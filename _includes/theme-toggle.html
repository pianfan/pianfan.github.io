<button type="button" class="theme-toggle" id="themeToggle" aria-label="切换主题" aria-haspopup="true" aria-expanded="false" aria-controls="themeMenu">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
    <path id="themeIcon" d="M12,18c-3.3,0-6-2.7-6-6s2.7-6,6-6s6,2.7,6,6S15.3,18,12,18zM12,8c-2.2,0-4,1.8-4,4s1.8,4,4,4s4-1.8,4-4S14.2,8,12,8z M12,2 c-5.5,0-10,4.5-10,10s4.5,10,10,10s10-4.5,10-10S17.5,2,12,2z"/>
  </svg>
</button>

<div class="theme-menu" id="themeMenu" role="menu" hidden>
  <button type="button" class="theme-option" role="menuitem" data-theme="system">跟随系统主题</button>
  <button type="button" class="theme-option" role="menuitem" data-theme="light">浅色模式</button>
  <button type="button" class="theme-option" role="menuitem" data-theme="dark">深色模式</button>
</div>

<script>
(function() {
  const ThemeManager = {
    init() {
      this.themeToggle = document.getElementById('themeToggle');
      this.themeIcon = document.getElementById('themeIcon');
      this.themeMenu = document.getElementById('themeMenu');
      this.themeOptions = document.querySelectorAll('.theme-option');
      this.root = document.documentElement;

      this.hideMenu();
      this.bindEvents();
      this.initTheme();
    },

    showMenu() {
      this.themeMenu.hidden = false;
      this.themeMenu.style.display = 'block';
      this.themeToggle.setAttribute('aria-expanded', 'true');
      this.highlightActiveOption();
    },

    hideMenu() {
      this.themeMenu.hidden = true;
      this.themeMenu.style.display = 'none';
      this.themeToggle.setAttribute('aria-expanded', 'false');
    },

    bindEvents() {
      this.themeToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (this.themeMenu.hidden) {
          this.showMenu();
        } else {
          this.hideMenu();
        }
      });

      this.themeOptions.forEach(option => {
        option.addEventListener('click', (e) => {
          e.stopPropagation();
          this.setTheme(option.getAttribute('data-theme'));
          this.hideMenu();
        });
      });

      document.addEventListener('click', (e) => {
        if (!this.themeMenu.contains(e.target) && !this.themeToggle.contains(e.target)) {
          this.hideMenu();
        }
      });

      this.themeToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') this.hideMenu();
      });

      this.systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
      this.systemThemeQuery.addEventListener('change', () => {
        const currentTheme = localStorage.getItem('theme') || 'system';
        if (currentTheme === 'system') {
          this.initTheme();
        }
      });

      // Sync once Giscus iframe is injected (lazy load).
      if (document.getElementById('giscus')) {
        const observer = new MutationObserver(() => {
          if (document.querySelector('iframe.giscus-frame')) {
            this.syncGiscus(this.root.classList.contains('dark-mode'));
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      }
    },

    applyDark(isDark) {
      this.root.classList.toggle('dark-mode', isDark);
      this.updateIcon(isDark);
      this.syncGiscus(isDark);
    },

    syncGiscus(isDark) {
      var theme = isDark ? 'dark' : 'light';
      var iframe = document.querySelector('iframe.giscus-frame');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: theme } } },
          'https://giscus.app'
        );
      }
    },

    initTheme() {
      try {
        const savedTheme = localStorage.getItem('theme') || 'system';
        if (savedTheme === 'system') {
          this.applyDark(this.systemThemeQuery.matches);
        } else {
          this.applyDark(savedTheme === 'dark');
        }
        this.highlightActiveOption();
      } catch (e) {
        console.error('初始化主题失败:', e);
      }
    },

    setTheme(theme) {
      localStorage.setItem('theme', theme);
      if (theme === 'system') {
        this.applyDark(this.systemThemeQuery.matches);
      } else {
        this.applyDark(theme === 'dark');
      }
      this.highlightActiveOption();
    },

    updateIcon(isDark) {
      try {
        const darkPath = "M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M12,3A9,9 0 0,0 3,12A9,9 0 0,0 12,21A9,9 0 0,0 21,12A9,9 0 0,0 12,3M12,19A7,7 0 0,1 5,12A7,7 0 0,1 12,5A7,7 0 0,1 19,12A7,7 0 0,1 12,19Z";
        const lightPath = "M12,18c-3.3,0-6-2.7-6-6s2.7-6,6-6s6,2.7,6,6S15.3,18,12,18zM12,8c-2.2,0-4,1.8-4,4s1.8,4,4,4s4-1.8,4-4S14.2,8,12,8z M12,2 c-5.5,0-10,4.5-10,10s4.5,10,10,10s10-4.5,10-10S17.5,2,12,2z";
        this.themeIcon.setAttribute('d', isDark ? darkPath : lightPath);
      } catch (e) {
        console.error('更新图标失败:', e);
      }
    },

    highlightActiveOption() {
      const currentTheme = localStorage.getItem('theme') || 'system';
      this.themeOptions.forEach(option => {
        option.classList.toggle('active', option.getAttribute('data-theme') === currentTheme);
      });
    }
  };

  ThemeManager.init();
})();
</script>
